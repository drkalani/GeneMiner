services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: geneminer-backend
    restart: unless-stopped
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/app/.cache/huggingface
      - HF_HUB_CACHE=/app/.cache/huggingface/hub
      - HUGGINGFACE_HUB_CACHE=/app/.cache/huggingface/hub
    volumes:
      - ./data:/app/data
      - ${HOME}/.cache/huggingface:/app/.cache/huggingface
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 10s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: /api
    container_name: geneminer-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
