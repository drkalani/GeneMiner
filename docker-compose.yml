services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: geneminer-backend
    restart: unless-stopped
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/app/.cache/huggingface
      - HF_HUB_CACHE=/app/.cache/huggingface/hub
      - HUGGINGFACE_HUB_CACHE=/app/.cache/huggingface/hub
    volumes:
      - ./data:/app/data
      - ${HOME}/.cache/huggingface:/app/.cache/huggingface
      - bent-cache:/root/.cache/bent
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 10s
      retries: 10

  bent-runtime:
    profiles:
      - bent
    image: pedroruas18/bent
    container_name: geneminer-bent-runtime
    environment:
      - TF_CPP_MIN_LOG_LEVEL=3
    volumes:
      - bent-cache:/root/.cache/bent
    # Keep this service off by default; enable it via `--profile bent`
    # and run `docker compose exec bent-runtime bent_setup` before enabling Bent jobs.
    command: ["tail", "-f", "/dev/null"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: /api
    container_name: geneminer-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  bent-cache:
